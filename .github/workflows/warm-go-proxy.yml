name: Warm proxy.golang.org for library/ modules

# After every merge to main that touches library/, ping
# proxy.golang.org for each CLI module's @latest and @v/list endpoints.
# This forces the public Go module proxy to fetch the new commit from
# GitHub and refresh its cached "latest pseudo-version" answer, so the
# first user who runs `go install <module>@latest` (directly or via
# `printing-press install`) does not race a stale proxy cache and 410
# during the fresh-merge window.
#
# Why this exists: this repo does not publish vX.Y.Z semver tags for
# library modules, so users install with @latest. proxy.golang.org
# resolves @latest by asking the upstream VCS what the tip of the
# default branch is — a result it caches for a short TTL. Until the
# proxy refreshes, @latest returns the previous commit (or, for a
# brand-new module path, may briefly serve a negative cache). Hitting
# /@latest and /@v/list ourselves right after merge primes both caches
# so users never observe the lag.
#
# Failures in the warm step are non-fatal: proxy lag self-resolves
# within minutes, and a failed warm leaves the world no worse than the
# pre-workflow status quo.

on:
  push:
    branches: [main]
    # Narrowed to Go-relevant files. Doc/metadata churn (SKILL.md,
    # README.md, .manuscripts/, .printing-press.json, dogfood/verify
    # JSON, .goreleaser.yaml) ships in the same module zip but does
    # not change what `go install` produces, so warming after those
    # is cosmetic — the proxy's @latest pointer would just be advanced
    # to a different commit that yields an identical binary, and the
    # proxy's natural ~1-minute cache TTL handles that case anyway.
    # Filter to commits that actually change the installable artifact.
    paths:
      - 'library/**/*.go'
      - 'library/**/go.mod'
      - 'library/**/go.sum'
      - '.github/workflows/warm-go-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    name: Warm proxy.golang.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Build module URL list from library/<cat>/<cli>/ directories
        id: modules
        run: |
          set -euo pipefail
          # Enumerate by directory rather than by registry.json. A new
          # CLI's PR adds library/<cat>/<cli>/go.mod in the same merge
          # commit that triggers this workflow, so directory enumeration
          # always sees the new entry. registry.json is regenerated by
          # generate-registry.yml afterward in a `[skip ci]` commit that
          # would NOT re-trigger this workflow, so reading it here would
          # miss brand-new CLIs — exactly the case warming exists to
          # fix. Directory paths also match what the public Go proxy
          # serves (the URL is keyed by repo subpath, not by the module
          # declaration inside go.mod).
          for gomod in library/*/*/go.mod; do
            dir="${gomod%/go.mod}"
            echo "github.com/mvanhorn/printing-press-library/${dir}"
          done | sort > modules.txt
          echo "Found $(wc -l < modules.txt) module(s) to warm."
      - name: Hit proxy.golang.org for each module
        run: |
          set -euo pipefail
          # Warm both @latest (forces resolution of the new commit's
          # pseudo-version) and @v/list (refreshes the version list
          # cache). 16-way parallelism keeps total runtime under a
          # minute even for the full catalog. -fsS reports HTTP errors
          # but stays quiet on success; --max-time bounds each request
          # so a hung proxy connection cannot stall the workflow.
          warm_one() {
            local module="$1"
            local endpoint="$2"
            local url="https://proxy.golang.org/${module}/${endpoint}"
            if curl -fsS -o /dev/null --max-time 30 "$url"; then
              echo "  ok  ${module} ${endpoint}"
            else
              echo "  miss ${module} ${endpoint} (non-fatal)"
            fi
          }
          export -f warm_one

          xargs -P 16 -I {} bash -c 'warm_one "$@"' _ {} '@latest' < modules.txt
          xargs -P 16 -I {} bash -c 'warm_one "$@"' _ {} '@v/list' < modules.txt
