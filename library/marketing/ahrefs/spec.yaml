          type: string
          required: false
          positional: false
          description: A timestamp in `YYYY-MM-DDThh:mm:ss` format specifying the
            crawl date to retrieve metrics from. Defaults to the most recent available
            crawl if omitted. For scheduled crawls, we return data from the latest
            crawl finished before the specified timestamp. For Always-on audit crawls,
            we return data as of the provided date and time. If the time component
            is omitted, it defaults to `00:00:00`. The timestamp is interpreted in
            UTC.
