            URLs that are newly crawled and match your filter conditions. `removed`:
            URLs that stopped matching your filter conditions. `missing`: URLs that
            weren''t crawled, but previously matched your filter conditions. `no_change`:
            URLs that match your filter conditions in a crawl and the crawl before
            it.'
