version: 2
project_name: juneoven-pp-cli
changelog:
  disable: true
builds:
  - id: juneoven-pp-cli
    main: ./cmd/juneoven-pp-cli
    binary: juneoven-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/juneoven/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: juneoven-pp-mcp
    main: ./cmd/juneoven-pp-mcp
    binary: juneoven-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: juneoven-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every June oven control from the terminal — self-pair, preheat, adjust, watch live telemetry, and cancel, over June's cloud with agent-native JSON."
    install: |
      bin.install "juneoven-pp-cli"
      bin.install "juneoven-pp-mcp"
