version: 2
project_name: myfitnesspal-pp-cli
changelog:
  disable: true
builds:
  - id: myfitnesspal-pp-cli
    main: ./cmd/myfitnesspal-pp-cli
    binary: myfitnesspal-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/myfitnesspal/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: myfitnesspal-pp-mcp
    main: ./cmd/myfitnesspal-pp-mcp
    binary: myfitnesspal-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: myfitnesspal-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Pull every meal you ever logged out of MyFitnessPal — per-food CSV, agent-shaped trends, and a local SQLite store..."
    install: |
      bin.install "myfitnesspal-pp-cli"
      bin.install "myfitnesspal-pp-mcp"
