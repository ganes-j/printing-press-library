version: 2
project_name: opensnow-pp-cli
changelog:
  disable: true
builds:
  - id: opensnow-pp-cli
    main: ./cmd/opensnow-pp-cli
    binary: opensnow-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/opensnow/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: opensnow-pp-mcp
    main: ./cmd/opensnow-pp-mcp
    binary: opensnow-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: opensnow-pp-cli
    repository:
      owner: dave-morin
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Hyper-local weather forecasts and conditions for any mountain location and elevation, worldwide. Provides current conditions, hourly forecasts, 5-day day/night snow forecasts, resort snow reports, and expert-written Daily Snow posts. Authentication via api_key query parameter (partnership access only)."
    install: |
      bin.install "opensnow-pp-cli"
      bin.install "opensnow-pp-mcp"
