version: 2
project_name: craigslist-pp-cli
changelog:
  disable: true
builds:
  - id: craigslist-pp-cli
    main: ./cmd/craigslist-pp-cli
    binary: craigslist-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/craigslist/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: craigslist-pp-mcp
    main: ./cmd/craigslist-pp-mcp
    binary: craigslist-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: craigslist-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Craigslist watcher and triage tool that knows what's a repost, what's a scam, and what just dropped in price."
    install: |
      bin.install "craigslist-pp-cli"
      bin.install "craigslist-pp-mcp"
