version: 2
project_name: anylist-pp-cli
changelog:
  disable: true
builds:
  - id: anylist-pp-cli
    main: ./cmd/anylist-pp-cli
    binary: anylist-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/food-and-dining/anylist/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: anylist-pp-mcp
    main: ./cmd/anylist-pp-mcp
    binary: anylist-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: anylist-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every AnyList feature in your terminal — plus offline search, store routing, and cron-safe automations no mobile..."
    install: |
      bin.install "anylist-pp-cli"
      bin.install "anylist-pp-mcp"
