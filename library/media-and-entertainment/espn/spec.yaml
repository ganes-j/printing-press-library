name: espn
display_name: ESPN
description: "ESPN Sports API CLI — scores, standings, news, and game data across 17 sports and 139 leagues"
version: "0.1.0"
base_url: "https://site.api.espn.com/apis/site/v2/sports"

auth:
  type: none

config:
  format: toml
  path: "~/.config/espn-pp-cli/config.toml"

resources:
  scoreboard:
    description: "Live and historical game scores"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/scoreboard"
        description: "Get scoreboard for a sport and league with optional date filtering"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug (football, basketball, baseball, hockey, soccer)"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug (nfl, nba, mlb, nhl, college-football, mens-college-basketball)"
          - name: dates
            type: string
            description: "Date or date range in YYYYMMDD or YYYYMMDD-YYYYMMDD format"
          - name: limit
            type: int
            default: 100
            description: "Maximum number of events to return"
          - name: groups
            type: int
            description: "Group filter for division games (use 50 for all Division I)"
        response:
          type: object
          item: Scoreboard

  teams:
    description: "Team information across all leagues"
    endpoints:
      list:
        method: GET
        path: "/{sport}/{league}/teams"
        description: "List all teams in a league"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: limit
            type: int
            default: 100
            description: "Maximum number of teams"
        response:
          type: object
          item: TeamsResponse

      get:
        method: GET
        path: "/{sport}/{league}/teams/{team_id}"
        description: "Get details for a specific team including record, links, and logos"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: team_id
            type: string
            required: true
            positional: true
            description: "Team ID number"
        response:
          type: object
          item: Team

      schedule:
        method: GET
        path: "/{sport}/{league}/teams/{team_id}/schedule"
        description: "Get past and upcoming schedule for a specific team"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: team_id
            type: string
            required: true
            positional: true
            description: "Team ID number"
          - name: season
            type: int
            description: "Season year (e.g. 2025)"
        response:
          type: object
          item: Schedule

  news:
    description: "Latest sports news and headlines"
    endpoints:
      list:
        method: GET
        path: "/{sport}/{league}/news"
        description: "Get latest news articles for a sport and league"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: limit
            type: int
            default: 25
            description: "Maximum number of articles to return"
        response:
          type: object
          item: NewsResponse

  summary:
    description: "Game summaries with box scores, play-by-play, and statistics"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/summary"
        description: "Get detailed game summary including box score, leaders, scoring plays, odds, and win probability"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: event
            type: string
            required: true
            description: "ESPN event or game ID"
        response:
          type: object
          item: GameSummary

  rankings:
    description: "College sports rankings and polls"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/rankings"
        description: "Get current AP, Coaches, and CFP poll rankings for college sports"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug (football or basketball)"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug (college-football, mens-college-basketball, womens-college-basketball)"
        response:
          type: object
          item: Rankings

  injuries:
    description: "Active injury reports for a league"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/injuries"
        description: "Get current injury list for a sport and league"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
        response:
          type: object
          item: Injuries

  transactions:
    description: "Recent trades, signings, releases, and waivers"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/transactions"
        description: "Get recent league transactions (trades, signings, waivers)"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
        response:
          type: object
          item: Transactions

  leaders:
    description: "Statistical leaders across categories"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/leaders"
        description: "Get statistical leaders for a sport and league with optional category filter"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: category
            type: string
            description: "Optional stat category (e.g. passing, rushing, points)"
        response:
          type: object
          item: Leaders

  plays:
    description: "Play-by-play feed for a specific event"
    endpoints:
      get:
        method: GET
        path: "/{sport}/{league}/plays"
        description: "Get plays for a specific event id"
        params:
          - name: sport
            type: string
            required: true
            positional: true
            description: "Sport slug"
          - name: league
            type: string
            required: true
            positional: true
            description: "League slug"
          - name: event
            type: string
            required: true
            description: "ESPN event or game id"
          - name: limit
            type: int
            default: 200
            description: "Maximum number of plays to return"
        response:
          type: object
          item: Plays

extra_commands:
  - name: trending
    description: "Most-followed athletes and teams across all leagues"
  - name: dashboard
    description: "Your favorite teams' status at a glance (reads [favorites] in config.toml)"
  - name: boxscore
    description: "Full box score for a specific event id"
    args: "<event_id>"
  - name: h2h
    description: "Head-to-head detail between two teams"
    args: "<team1> <team2>"
  - name: compare
    description: "Side-by-side athlete stat comparison"
    args: "<athlete1> <athlete2>"
  - name: odds
    description: "Spread, total, and moneyline lines for tonight's slate"
    args: "<sport> <league>"
  - name: sos
    description: "Strength-of-schedule derived from league standings"
    args: "<sport> <league>"

types:
  Scoreboard:
    fields:
      - name: events
        type: string
      - name: leagues
        type: string
      - name: season
        type: string
      - name: week
        type: string

  TeamsResponse:
    fields:
      - name: sports
        type: string

  Team:
    fields:
      - name: id
        type: string
      - name: uid
        type: string
      - name: displayName
        type: string
      - name: abbreviation
        type: string
      - name: location
        type: string
      - name: name
        type: string
      - name: color
        type: string
      - name: isActive
        type: bool

  Schedule:
    fields:
      - name: events
        type: string
      - name: team
        type: string
      - name: season
        type: string

  NewsResponse:
    fields:
      - name: header
        type: string
      - name: articles
        type: string

  GameSummary:
    fields:
      - name: boxscore
        type: string
      - name: gameInfo
        type: string
      - name: leaders
        type: string
      - name: scoringPlays
        type: string
      - name: winprobability
        type: string
      - name: odds
        type: string
      - name: header
        type: string

  Rankings:
    fields:
      - name: rankings
        type: string
      - name: sports
        type: string

  Injuries:
    fields:
      - name: injuries
        type: string

  Transactions:
    fields:
      - name: transactions
        type: string

  Leaders:
    fields:
      - name: leaders
        type: string
      - name: categories
        type: string

  Plays:
    fields:
      - name: items
        type: string
      - name: count
        type: string
