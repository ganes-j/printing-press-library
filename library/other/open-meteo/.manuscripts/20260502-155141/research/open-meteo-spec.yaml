name: open-meteo
display_name: Open-Meteo
description: "Free, open-source weather, climate, and air-quality data — covers Open-Meteo's full no-API-key surface (forecast, archive, marine, air-quality, flood, climate, ensemble, seasonal, geocoding, elevation)."
cli_description: "Forecasts, historicals, marine, air quality, flood, climate, ensemble, and seasonal data from Open-Meteo's free tier."
version: "0.1.0"
homepage: https://open-meteo.com
website: https://open-meteo.com
base_url: "https://api.open-meteo.com"

# Free tier needs no authentication. The customer-tier route is wired up
# in Phase 3 as a small client-level shim that swaps the host and appends
# the apikey query param when OPEN_METEO_API_KEY is set.
auth:
  type: none

config:
  format: toml
  path: "~/.config/open-meteo-pp-cli/config.toml"

cache:
  enabled: true

resources:

  forecast:
    description: "Weather forecast (up to 16 days). Free, no API key, hourly + daily + current resolution. Default model is best-available; pass --models for specific models (gfs_seamless, ecmwf_ifs025, dwd_icon, jma_seamless, metno_seamless, gem_seamless, meteofrance_arpege_world)."
    base_url: "https://api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/forecast"
        description: "7-16 day weather forecast for one or more coordinates. Pass comma-separated latitude/longitude for batch fetch."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude in degrees. Single value (47.6) or comma-separated for multi-location batch (47.6,52.5)."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude in degrees. Single value (-122.3) or comma-separated for multi-location batch (-122.3,13.4)."
          - name: elevation
            type: string
            description: "Optional elevation override in meters. Use 'nan' to disable downscaling."
          - name: hourly
            type: string
            description: "Comma-separated hourly variables (e.g., temperature_2m,precipitation,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover)."
          - name: daily
            type: string
            description: "Comma-separated daily variables (e.g., temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code,sunrise,sunset)."
          - name: current
            type: string
            description: "Comma-separated current variables (e.g., temperature_2m,wind_speed_10m,weather_code)."
          - name: minutely_15
            type: string
            description: "Comma-separated 15-minute variables (e.g., temperature_2m,precipitation)."
          - name: temperature_unit
            type: string
            enum: [celsius, fahrenheit]
            default: celsius
            description: "Temperature unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: precipitation_unit
            type: string
            enum: [mm, inch]
            default: mm
            description: "Precipitation unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, 'auto' (resolved from coords), or UTC. Defaults to GMT."
          - name: past_days
            type: int
            description: "Include this many past days (0-92)."
          - name: forecast_days
            type: int
            description: "Number of forecast days (1-16). Default 7."
          - name: forecast_hours
            type: int
            description: "Number of forecast hours."
          - name: forecast_minutely_15
            type: int
            description: "Number of 15-min forecast slots."
          - name: past_hours
            type: int
            description: "Number of past hours."
          - name: past_minutely_15
            type: int
            description: "Number of past 15-min slots."
          - name: start_date
            type: string
            format: date
            description: "Forecast start date (YYYY-MM-DD)."
          - name: end_date
            type: string
            format: date
            description: "Forecast end date (YYYY-MM-DD)."
          - name: start_hour
            type: string
            description: "Forecast start hour (YYYY-MM-DDTHH:MM)."
          - name: end_hour
            type: string
            description: "Forecast end hour (YYYY-MM-DDTHH:MM)."
          - name: models
            type: string
            description: "Comma-separated forecast models (gfs_seamless, ecmwf_ifs025, dwd_icon, jma_seamless, metno_seamless, gem_seamless, meteofrance_arpege_world, etc.). Default best-available."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection preference."

  archive:
    description: "Historical weather data (ERA5 reanalysis, 1940 to ~5 days ago). Same variable surface as forecast."
    base_url: "https://archive-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/archive"
        description: "Historical hourly/daily weather observations from ERA5 (1940 to ~5 days ago)."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude in degrees. Comma-separated for batch."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude in degrees. Comma-separated for batch."
          - name: start_date
            type: string
            format: date
            required: true
            description: "Archive start date (YYYY-MM-DD). Earliest 1940-01-01."
          - name: end_date
            type: string
            format: date
            required: true
            description: "Archive end date (YYYY-MM-DD). Latest ~5 days ago."
          - name: hourly
            type: string
            description: "Comma-separated hourly variables."
          - name: daily
            type: string
            description: "Comma-separated daily aggregates."
          - name: temperature_unit
            type: string
            enum: [celsius, fahrenheit]
            default: celsius
            description: "Temperature unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: precipitation_unit
            type: string
            enum: [mm, inch]
            default: mm
            description: "Precipitation unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, auto, or UTC."
          - name: models
            type: string
            description: "Comma-separated archive models (era5_seamless, era5, era5_land, ecmwf_ifs, cerra)."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection preference."

  marine:
    description: "Marine weather: wave height, period, direction, swell components, sea-surface temperature."
    base_url: "https://marine-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/marine"
        description: "Marine forecast/historical: waves, swells, sea-surface temperature."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude. Comma-separated for batch."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude. Comma-separated for batch."
          - name: hourly
            type: string
            description: "Comma-separated hourly marine variables (wave_height,wave_direction,wave_period,wind_wave_height,swell_wave_height,sea_surface_temperature,...)."
          - name: daily
            type: string
            description: "Comma-separated daily marine aggregates."
          - name: current
            type: string
            description: "Comma-separated current-conditions marine variables."
          - name: length_unit
            type: string
            enum: [metric, imperial]
            default: metric
            description: "Wave height/length unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, auto, or UTC."
          - name: past_days
            type: int
            description: "Include past days."
          - name: forecast_days
            type: int
            description: "Forecast days (1-8)."
          - name: forecast_hours
            type: int
            description: "Forecast hours."
          - name: past_hours
            type: int
            description: "Past hours."
          - name: start_date
            type: string
            format: date
            description: "Start date."
          - name: end_date
            type: string
            format: date
            description: "End date."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection."

  air-quality:
    description: "Air quality and pollen: PM2.5, PM10, ozone, NO2, SO2, CO, dust, pollens, EU/US AQI, UV."
    base_url: "https://air-quality-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/air-quality"
        description: "Air quality forecast and historical: pollutants, AQI, pollen, UV."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude. Comma-separated for batch."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude. Comma-separated for batch."
          - name: hourly
            type: string
            description: "Hourly variables (pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone,sulphur_dioxide,uv_index,uv_index_clear_sky,european_aqi,us_aqi,alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen,...)."
          - name: current
            type: string
            description: "Current air-quality variables."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, auto, or UTC."
          - name: past_days
            type: int
            description: "Include past days."
          - name: forecast_days
            type: int
            description: "Forecast days (1-7)."
          - name: forecast_hours
            type: int
            description: "Forecast hours."
          - name: past_hours
            type: int
            description: "Past hours."
          - name: start_date
            type: string
            format: date
            description: "Start date."
          - name: end_date
            type: string
            format: date
            description: "End date."
          - name: domains
            type: string
            enum: [auto, cams_global, cams_europe, gfs_aerosol]
            description: "Air-quality model domain."

  flood:
    description: "River discharge / flood forecasts (GloFAS)."
    base_url: "https://flood-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/flood"
        description: "Daily river discharge forecasts and historicals from GloFAS."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude."
          - name: daily
            type: string
            description: "Daily flood variables (river_discharge,river_discharge_mean,river_discharge_median,river_discharge_max,river_discharge_min,river_discharge_p25,river_discharge_p75)."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: past_days
            type: int
            description: "Include past days."
          - name: forecast_days
            type: int
            description: "Forecast days (1-210)."
          - name: start_date
            type: string
            format: date
            description: "Start date."
          - name: end_date
            type: string
            format: date
            description: "End date."
          - name: ensemble
            type: bool
            description: "Return all ensemble members."
          - name: models
            type: string
            description: "GloFAS model versions (forecast_v3, forecast_v4, seamless_v3, seamless_v4)."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection."

  climate:
    description: "CMIP6 climate change projections (1950-2050) under SSP scenarios."
    base_url: "https://climate-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/climate"
        description: "Daily CMIP6 climate projections for any (lat, lon) under SSP scenarios. Models include EC_Earth3P_HR, CMCC_CM2_VHR4, MRI_AGCM3_2_S, MPI_ESM1_2_XR, FGOALS_f3_H, NICAM16_8S, HiRAM_SIT_HR."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude."
          - name: start_date
            type: string
            format: date
            required: true
            description: "Climate start date (YYYY-MM-DD). 1950 to 2050."
          - name: end_date
            type: string
            format: date
            required: true
            description: "Climate end date (YYYY-MM-DD). 1950 to 2050."
          - name: daily
            type: string
            description: "Daily climate variables (temperature_2m_mean,temperature_2m_max,temperature_2m_min,precipitation_sum,relative_humidity_2m_mean,wind_speed_10m_mean,...)."
          - name: temperature_unit
            type: string
            enum: [celsius, fahrenheit]
            default: celsius
            description: "Temperature unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: precipitation_unit
            type: string
            enum: [mm, inch]
            default: mm
            description: "Precipitation unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: models
            type: string
            description: "Comma-separated CMIP6 models (EC_Earth3P_HR,CMCC_CM2_VHR4,MRI_AGCM3_2_S,MPI_ESM1_2_XR,FGOALS_f3_H,NICAM16_8S,HiRAM_SIT_HR)."
          - name: disable_bias_correction
            type: bool
            description: "Disable bias correction (default false)."

  ensemble:
    description: "Ensemble forecasts (all model members) for uncertainty quantification."
    base_url: "https://ensemble-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/ensemble"
        description: "Hourly ensemble forecasts; returns all ensemble members so you can quantify uncertainty."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude."
          - name: hourly
            type: string
            description: "Hourly variables (one per ensemble member returned)."
          - name: temperature_unit
            type: string
            enum: [celsius, fahrenheit]
            default: celsius
            description: "Temperature unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: precipitation_unit
            type: string
            enum: [mm, inch]
            default: mm
            description: "Precipitation unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, auto, or UTC."
          - name: past_days
            type: int
            description: "Past days."
          - name: forecast_days
            type: int
            description: "Forecast days."
          - name: forecast_hours
            type: int
            description: "Forecast hours."
          - name: past_hours
            type: int
            description: "Past hours."
          - name: start_date
            type: string
            format: date
            description: "Start date."
          - name: end_date
            type: string
            format: date
            description: "End date."
          - name: models
            type: string
            description: "Comma-separated ensemble models (icon_seamless, icon_global, gfs_seamless, gfs025, gfs05, ecmwf_ifs025, ecmwf_ifs04, gem_global)."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection."

  seasonal:
    description: "Seasonal forecasts (up to 9 months) using NCEP CFSv2."
    base_url: "https://seasonal-api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/seasonal"
        description: "9-month seasonal forecast at six-hourly resolution. Default model is NCEP CFSv2."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude."
          - name: six_hourly
            type: string
            description: "Six-hourly variables (temperature_2m,precipitation,...)."
          - name: daily
            type: string
            description: "Daily aggregates."
          - name: temperature_unit
            type: string
            enum: [celsius, fahrenheit]
            default: celsius
            description: "Temperature unit."
          - name: wind_speed_unit
            type: string
            enum: [kmh, ms, mph, kn]
            default: kmh
            description: "Wind speed unit."
          - name: precipitation_unit
            type: string
            enum: [mm, inch]
            default: mm
            description: "Precipitation unit."
          - name: timeformat
            type: string
            enum: [iso8601, unixtime]
            default: iso8601
            description: "Time output format."
          - name: timezone
            type: string
            description: "Named timezone, auto, or UTC."
          - name: past_days
            type: int
            description: "Past days."
          - name: forecast_days
            type: int
            description: "Forecast days (default 92)."
          - name: models
            type: string
            description: "Comma-separated seasonal models (cfsv2)."
          - name: cell_selection
            type: string
            enum: [land, sea, nearest]
            description: "Grid cell selection."

  geocode:
    description: "Geocoding: search locations by name/postcode, or look up a location by ID."
    base_url: "https://geocoding-api.open-meteo.com"
    endpoints:
      search:
        method: GET
        path: "/v1/search"
        description: "Search locations worldwide by name (\"Berlin\", \"Springfield, IL\") or postcode."
        no_auth: true
        params:
          - name: name
            type: string
            required: true
            description: "Location name or postcode (>=2 chars). Case-insensitive."
          - name: count
            type: int
            default: 10
            description: "Max results to return (1-100)."
          - name: language
            type: string
            description: "ISO-639 language code for localized names (en, de, fr, es, it, pt, ru, zh, ja, ...)."
          - name: format
            type: string
            enum: [json, protobuf]
            default: json
            description: "Response format."
      get:
        method: GET
        path: "/v1/get"
        description: "Look up a single location by its Open-Meteo geocoding ID."
        no_auth: true
        params:
          - name: id
            type: int
            required: true
            description: "Open-Meteo geocoding location ID."
          - name: language
            type: string
            description: "ISO-639 language code for localized names."
          - name: format
            type: string
            enum: [json, protobuf]
            default: json
            description: "Response format."

  elevation:
    description: "Digital elevation model lookup. Supports up to 100 coordinates per call."
    base_url: "https://api.open-meteo.com"
    endpoints:
      get:
        method: GET
        path: "/v1/elevation"
        description: "Lookup elevation in meters for one or more coordinate pairs (up to 100)."
        no_auth: true
        params:
          - name: latitude
            type: string
            required: true
            description: "WGS84 latitude. Comma-separated for batch (up to 100 values)."
          - name: longitude
            type: string
            required: true
            description: "WGS84 longitude. Comma-separated for batch (up to 100 values)."
