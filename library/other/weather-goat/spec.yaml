name: weather
display_name: Weather GOAT
description: "Weather GOAT — forecasts, alerts, air quality, and activity verdicts powered by Open-Meteo and NWS"
version: "1.0.0"
base_url: "https://api.open-meteo.com/v1"
website_url: "https://open-meteo.com"
category: "other"

auth:
  type: none

config:
  format: toml
  path: "~/.config/weather-pp-cli/config.toml"

resources:
  forecast:
    description: "Get weather forecasts — current, hourly, and daily"
    endpoints:
      now:
        method: GET
        path: "/forecast"
        description: "Get current weather conditions and today's forecast"
        params:
          - name: latitude
            type: float
            required: true
            description: "Latitude (-90 to 90)"
          - name: longitude
            type: float
            required: true
            description: "Longitude (-180 to 180)"
          - name: current
            type: string
            description: "Current weather variables (temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index)"
            default: "temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,uv_index"
          - name: daily
            type: string
            description: "Daily forecast variables"
            default: "temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,uv_index_max,wind_speed_10m_max"
          - name: timezone
            type: string
            description: "Timezone (e.g. America/New_York, auto)"
            default: "auto"
          - name: temperature_unit
            type: string
            description: "Temperature unit: celsius or fahrenheit"
            default: "fahrenheit"
          - name: wind_speed_unit
            type: string
            description: "Wind speed unit: kmh, mph, ms, kn"
            default: "mph"
          - name: forecast_days
            type: int
            description: "Number of forecast days (1-16)"
            default: 7
        response:
          type: object
          item: Forecast
        no_auth: true

      hourly:
        method: GET
        path: "/forecast"
        description: "Get hourly forecast for the next 48 hours"
        params:
          - name: latitude
            type: float
            required: true
            description: "Latitude"
          - name: longitude
            type: float
            required: true
            description: "Longitude"
          - name: hourly
            type: string
            description: "Hourly variables to fetch"
            default: "temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,uv_index"
          - name: timezone
            type: string
            default: "auto"
          - name: temperature_unit
            type: string
            default: "fahrenheit"
          - name: wind_speed_unit
            type: string
            default: "mph"
          - name: forecast_hours
            type: int
            description: "Number of forecast hours"
            default: 48
        response:
          type: object
          item: HourlyForecast
        no_auth: true

  air-quality:
    description: "Get air quality data — AQI, pollen, PM2.5, UV index"
    endpoints:
      get:
        method: GET
        path: "/air-quality"
        description: "Get current air quality index, PM2.5, PM10, pollen levels, and UV index"
        params:
          - name: latitude
            type: float
            required: true
            description: "Latitude"
          - name: longitude
            type: float
            required: true
            description: "Longitude"
          - name: current
            type: string
            description: "Current AQ variables"
            default: "us_aqi,pm2_5,pm10,uv_index,alder_pollen,birch_pollen,grass_pollen,ragweed_pollen"
          - name: timezone
            type: string
            default: "auto"
        response:
          type: object
          item: AirQuality
        no_auth: true

  history:
    description: "Get historical weather data (1940-present)"
    endpoints:
      get:
        method: GET
        path: "/archive"
        description: "Get historical weather data for any date back to 1940"
        params:
          - name: latitude
            type: float
            required: true
            description: "Latitude"
          - name: longitude
            type: float
            required: true
            description: "Longitude"
          - name: start_date
            type: string
            required: true
            description: "Start date (YYYY-MM-DD)"
          - name: end_date
            type: string
            required: true
            description: "End date (YYYY-MM-DD)"
          - name: daily
            type: string
            description: "Daily variables to fetch"
            default: "temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max"
          - name: timezone
            type: string
            default: "auto"
          - name: temperature_unit
            type: string
            default: "fahrenheit"
        response:
          type: object
          item: HistoricalData
        no_auth: true

  geocoding:
    description: "Resolve location names to coordinates"
    endpoints:
      search:
        method: GET
        path: "/search"
        description: "Search for a location by name and get coordinates"
        params:
          - name: name
            type: string
            required: true
            positional: true
            description: "Location name to search for"
          - name: count
            type: int
            description: "Number of results"
            default: 5
          - name: language
            type: string
            description: "Language for results"
            default: "en"
        response:
          type: array
          item: GeoResult
        response_path: "results"
        no_auth: true

types:
  Forecast:
    fields:
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: timezone
        type: string
      - name: current
        type: object
      - name: daily
        type: object

  HourlyForecast:
    fields:
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: hourly
        type: object

  AirQuality:
    fields:
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: current
        type: object

  HistoricalData:
    fields:
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: daily
        type: object

  GeoResult:
    fields:
      - name: id
        type: int
      - name: name
        type: string
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: country
        type: string
      - name: admin1
        type: string
