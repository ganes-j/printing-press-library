version: 2
project_name: american-reindustrialization-pp-cli
changelog:
  disable: true
builds:
  - id: american-reindustrialization-pp-cli
    main: ./cmd/american-reindustrialization-pp-cli
    binary: american-reindustrialization-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/american-reindustrialization/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: american-reindustrialization-pp-mcp
    main: ./cmd/american-reindustrialization-pp-mcp
    binary: american-reindustrialization-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: american-reindustrialization-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Browse, slice, and analyze the curated American Reindustrialization directory — with diffs, geo clusters, sector..."
    install: |
      bin.install "american-reindustrialization-pp-cli"
      bin.install "american-reindustrialization-pp-mcp"
